name: Vercel Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Secret scanning ───────────────────────────────────────────────
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Dependency + IaC + container vuln scan ────────────────────────
      - name: Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # ── 3. SAST + quality gate ───────────────────────────────────────────
      - name: Create SonarCloud properties
        run: |
          cat > sonar-project.properties << 'EOF'
          sonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          sonar.organization=${{ secrets.SONAR_ORG }}
          sonar.sources=.
          sonar.exclusions=node_modules/**,dist/**,.next/**
          EOF

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  codeql:
    name: CodeQL (Deep SAST)
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: codeql
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Build & Deploy
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "vercel_url=$URL" >> $GITHUB_OUTPUT

      # - name: Comment on PR
      #   if: github.event_name == 'pull_request'
      #   uses: thollander/actions-comment-pull-request@v2
      #   with:
      #     message: |
      #       ### Preview Deployment Ready! 🚀
      #       | Item | Details |
      #       | :--- | :--- |
      #       | **Status** | ✅ Success |
      #       | **Preview URL** | [${{ steps.deploy.outputs.vercel_url }}](${{ steps.deploy.outputs.vercel_url }}) |
      #       | **Environment** | Preview |
