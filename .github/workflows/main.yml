name: Vercel Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: [main]
  pull_request: # This makes it show up as a check in your PRs

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        # Pulls 'production' settings only for main branch, else 'preview'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Build & Deploy
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # PRODUCTION DEPLOY
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            # PREVIEW DEPLOY (Safe for PRs)
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "vercel_url=$URL" >> $GITHUB_OUTPUT

      - name: Create Summary
        run: |
          echo "### Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ github.event_name == 'push' && 'Production' || 'Preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.deploy.outputs.vercel_url }}" >> $GITHUB_STEP_SUMMARY
