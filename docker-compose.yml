services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: massage-api
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/massage_booking}
    ports:
      - "5000:5000"
    # depends_on:
    #   - mongo
    restart: unless-stopped

